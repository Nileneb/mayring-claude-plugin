name: tests

# Gate für die Plugin-Tests (hooks/_device.py etc.). Klar benannter Check
# "plugin: pytest" → Komponenten-Attribution in der GitHub-Checks-Liste.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: "plugin: pytest"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pytest
      - run: pytest tests/ -q
