name: repo-watch
on:
  workflow_call:
    secrets:
      MAYRING_TOKEN:
        # WHY(#1): legacy fallback only. Primary auth is GitHub OIDC (secretless) —
        # see github_oidc.verify_github_oidc in MayringCoder. New callers don't pass it.
        required: false
permissions:
  contents: read
  id-token: write
jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: POST event to MayringCoder (best-effort, GitHub OIDC)
        continue-on-error: true
        env:
          API: ${{ vars.MAYRING_API_URL || 'https://mcp.linn.games' }}
          EV: ${{ github.event_name }}
          REPO: ${{ github.server_url }}/${{ github.repository }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          CONCL: ${{ github.event.workflow_run.conclusion }}
          WF: ${{ github.event.workflow_run.name }}
          LEGACY_TOKEN: ${{ secrets.MAYRING_TOKEN }}
        run: |
          # loop guard (the caller's explicit workflow list already excludes repo-watch)
          if [ "$EV" = "workflow_run" ] && [ "$WF" = "repo-watch" ]; then
            echo "self-run, skipping"; exit 0
          fi
          case "$EV" in
            push) ETYPE=push ;;
            workflow_run) ETYPE=workflow_run ;;
            *) ETYPE="$EV" ;;
          esac
          # Prefer GitHub OIDC (secretless, owner-gated server-side). Mint a short-lived
          # token scoped to audience mcp.linn.games. Fall back to legacy MAYRING_TOKEN
          # only if the caller didn't grant id-token: write (transition window).
          AUTH=""
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            OIDC=$(curl -sS -m 10 \
              -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=mcp.linn.games" | jq -r '.value // empty')
            [ -n "$OIDC" ] && AUTH="Bearer $OIDC"
          fi
          if [ -z "$AUTH" ] && [ -n "$LEGACY_TOKEN" ]; then AUTH="Bearer $LEGACY_TOKEN"; fi
          if [ -z "$AUTH" ]; then echo "no auth available (no id-token perm + no legacy token)"; exit 0; fi
          AUTH_KIND=$([ -n "$OIDC" ] && echo "oidc" || echo "legacy-token")
          CODE=$(curl -sS -m 10 -o /tmp/resp -w "%{http_code}" -X POST "$API/repo-events" \
            -H "Authorization: $AUTH" -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg e "$ETYPE" --arg r "$REPO" --arg s "$SHA" --arg ref "$REF" \
                     --arg c "$CONCL" --arg w "$WF" \
                     '{event_type:$e, repo:$r, sha:$s, ref:$ref, conclusion:$c, workflow:$w}')" \
            || echo "000")
          echo "repo-watch POST /repo-events ($AUTH_KIND) → HTTP $CODE"
          head -c 300 /tmp/resp 2>/dev/null || true
          # observability only — never fail the run (continue-on-error backs this up too)
